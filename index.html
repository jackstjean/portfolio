<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack St Jean</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">

  <div class="name">Jack St Jean</div>

  <div class="section">
    <div class="plain-list">
      <a href="mailto:jackstjean@gmail.com">jackstjean@gmail.com</a>
      <a href="https://instagram.com/stjean.mp3" target="_blank" rel="noopener">Instagram</a>
      <a href="https://www.tiktok.com/@prodjazzbox" target="blank" rel="noopener">TikTok</a>
      <!-- <a href="https://soundcloud.com/user-986686936" target="_blank" rel="noopener">SoundCloud</a> -->
    </div>
  </div>

  <div class="section">
    <div class="section-label">Bio</div>
    <p>Audio Engineer based in Asheville, NC.</p>
    <!-- <p>Bachelor of Science in Music Technology from UNC Asheville.</p> -->
  </div>

  <div class="section-toggle" id="section-toggle">
    <button class="toggle-btn" data-show="all">All</button>
    <button class="toggle-btn" data-show="personal">Personal</button>
    <button class="toggle-btn active" data-show="client">Client Work</button>
  </div>

  <div class="section" id="section-client">
    <div class="section-label">Client Work</div>
    <div class="filter-cats" id="client-filter-cats"></div>
    <div class="filter-sub" id="client-filter-sub"></div>
    <div id="client-list"></div>
  </div>

  <div class="section" id="section-personal" style="display:none">
    <div class="section-label">Personal</div>
    <div class="filter-cats" id="personal-filter-cats"></div>
    <div class="filter-sub" id="personal-filter-sub"></div>
    <div id="personal-list"></div>
  </div>
  
</div>

<div id="now-playing">
  <span id="np-title"></span>
  <button id="np-toggle">pause</button>
</div>

<script src="tracks.js"></script>
<script src="main.js"></script>
</body>
</html>
